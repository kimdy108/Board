<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <style>
        a {
            text-decoration: none;
            color: black;
        }
        table {
            margin: auto;
            width: auto;
            border-radius: 5px;
            border-collapse: collapse;
            border-top: none;
        }
        .table td {
            height: 30px;
            font-size: 14px;
        }
        button {
            width: 118px;
            height: 30px;
            font-size: 15px;
            border: 0;
            outline: 1.5px rgb(68, 136, 244) solid;
            border-radius: 5px;
            padding-left: 10px;
            background-color: rgb(164, 199, 255);
            margin-top: 10px;
        }
        button:active {
            width: 118px;
            height: 30px;
            font-size: 15px;
            border: 0;
            border-radius: 5px;
            outline: 1.5px rgb(27, 76, 155) solid;
            padding-left: 10px;
            background-color: rgb(68, 136, 244);
        }
        input[type="text"] {
            border: 1.5px rgb(68, 136, 244) solid;
            width: 230px;
            height: 30px;
            border-radius: 5px;
            padding-left: 10px;
        }
        input[type="password"] {
            border: 1.5px rgb(68, 136, 244) solid;
            width: 230px;
            height: 30px;
            border-radius: 5px;
            padding-left: 10px;
        }
        input[type="submit"] {
            width: 118px;
            height: 30px;
            font-size: 15px;
            border: 0;
            outline: 1.5px rgb(68, 136, 244) solid;
            border-radius: 5px;
            padding-left: 10px;
            background-color: rgb(164, 199, 255);
            margin-top: 10px;
        }
        input[type="submit"]:active {
            width: 118px;
            height: 30px;
            font-size: 15px;
            border: 0;
            border-radius: 5px;
            outline: 1.5px rgb(27, 76, 155) solid;
            padding-left: 10px;
            background-color: rgb(68, 136, 244);
        }
    </style>
</head>

<script th:inline="javascript">

    function displayAlert() {
        var message = document.getElementById('message').value;
        if (message) {
            alert(message);
        }
    }

</script>

<body onload="displayAlert()">
    <form action="/signup/member" method="post" enctype="application/json" id="signupall">
    <input type="hidden" id="message" name="message" th:value="${message}">
        <table class="table" style="margin-top: 250px">
            <tr style="text-align: center"><td colspan="2"><h2>𝓑𝓸𝓪𝓻𝓭</h2></td></tr>
            <tr><td colspan="2"><input type="text" placeholder="아이디" name="id" th:value="${id}"></td></tr>
            <tr><td colspan="2"><input type="text" placeholder="닉네임" name="nickname" th:value="${nickname}"></td></tr>
            <tr><td colspan="2"><input type="password" placeholder="비밀번호" name="password" th:value="${password}"></td></tr>
            <tr><td colspan="2"><input type="text" placeholder="이름" name="username" th:value="${username}"></td></tr>
            <tr><td colspan="2"><input type="text" placeholder="번호" name="phone_num" th:value="${phone_num}"></td></tr>
            <tr>
                <td><input type="submit" value="가입"></td>
                <td><button><a href="/login">뒤로</a></button></td>
            </tr>
        </table>
    </form>
</body>
</html>
