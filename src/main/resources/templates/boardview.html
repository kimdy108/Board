<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글</title>
    <style>
        a {
            text-decoration: none;
            color: black;
        }
        table {
            margin: auto;
            width: 500px;
            border-radius: 5px;
            border-collapse: collapse;
            border-top: none;
        }
        .header {
            text-align: center;
        }
        .header .title {
            text-align: left;
            width: 420px;
        }
        .header .writer {
            text-align: center;
            border-left: 1px lightgray solid;
        }
        .table td, .table th {
            border-bottom: 1px lightgray solid;
            height: 30px;
            font-size: 14px;
        }
        .body {
            text-align: left;
            height: 500px;
        }
        .fileShow {
            text-align: center;
        }
        .buttonTable {
            text-align: center;
            margin-top: 10px;
        }
        button {
            width: 100px;
            height: 20px;
            font-size: 15px;
            border: 0;
            outline: 1.5px rgb(68, 136, 244) solid;
            border-radius: 5px;
            padding-left: 10px;
            background-color: rgb(164, 199, 255);
        }
        button:active {
            width: 100px;
            height: 20px;
            font-size: 15px;
            border: 0;
            border-radius: 5px;
            outline: 1.5px rgb(27, 76, 155) solid;
            padding-left: 10px;
            background-color: rgb(68, 136, 244);
        }
        .bottomButton {
            width: 200px;
            height: 40px;
            font-size: 15px;
            border: 0;
            outline: 1.5px rgb(68, 136, 244) solid;
            border-radius: 5px;
            padding-left: 10px;
            background-color: rgb(164, 199, 255);
        }
        .bottomButton:active {
            width: 200px;
            height: 40px;
            font-size: 15px;
            border: 0;
            border-radius: 5px;
            outline: 1.5px rgb(27, 76, 155) solid;
            padding-left: 10px;
            background-color: rgb(68, 136, 244);
        }
        input {
            height: 20px;
            font-size: 15px;
            border: 0;
            outline: 1px solid;
            border-radius: 5px;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <table class="table">
        <tr><td colspan="2"><h2>𝓑𝓸𝓪𝓻𝓭</h2></td></tr>
        <tr class="header">
            <td class="title"><h4 th:text="${board.title}">title</h4></td>
            <td class="writer">작성자</td>
        </tr>
        <tr class="body"><td colspan="2" th:text="${board.content}"></td></tr>
        <tr th:if="${board.filename != null}">
            <td th:text="${board.filename}"></td>
            <td class="fileShow"><button><a th:href="@{${board.filepath}}">미리보기</a></button></td>
        </tr>
    </table>
    <table class="buttonTable">
        <tr>
            <td><button class="bottomButton"><a th:href="@{/board/modify/{id}(id = ${board.id})}">수정</a></button></td>
            <td><button class="bottomButton"><a th:href="@{/board/delete(id=${board.id})}">삭제</a></button></td>
        </tr>
    </table>
</body>
</html>
