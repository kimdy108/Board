<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 작성</title>
    <style>
        table {
            margin: auto;
        }
        input[type="text"] {
            border: 1.5px rgb(68, 136, 244) solid;
            width: 500px;
            height: 30px;
            border-radius: 5px;
            padding-left: 10px;
        }
        textarea {
            border: 1.5px rgb(68, 136, 244) solid;
            width: 500px;
            height: 400px;
            border-radius: 5px;
            padding-left: 10px;
            padding-top: 10px;
            resize: none;
        }
        .header {
            height: 30px;
        }
        input[type="submit"] {
            width: 100px;
            height: 40px;
            font-size: 15px;
            border: 0;
            outline: 1.5px rgb(68, 136, 244) solid;
            border-radius: 5px;
            padding-left: 10px;
            background-color: rgb(164, 199, 255);
            margin-top: 10px;
        }
        input[type="submit"]:active {
            width: 100px;
            height: 40px;
            font-size: 15px;
            border: 0;
            border-radius: 5px;
            outline: 1.5px rgb(27, 76, 155) solid;
            padding-left: 10px;
            background-color: rgb(68, 136, 244);
        }
    </style>
</head>
<body>
    <form action="/board/writepro" method="post" enctype="multipart/form-data">
        <table>
            <tr><td><h2>게시글 작성</h2></td></tr>
            <tr><td class="header">Title</td></tr>
            <tr><td><input type="text" placeholder="제목을 입력하세요" name="title"></td></tr>
            <tr><td class="header">Comment</td></tr>
            <tr><td><textarea placeholder="내용을 입력하세요" name="content"></textarea></td></tr>
            <tr><td class="header">File</td></tr>
            <tr><td><input type="file" name="file"></td></tr>
            <tr><td><input type="submit" value="등록"></td></tr>
        </table>
    </form>
</body>
</html>
